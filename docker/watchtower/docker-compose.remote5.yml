services:
  watchtower_remote5:
    container_name: watchtower_${REMOTE5_NAME}
    image: nickfedor/watchtower
    volumes:
      - /etc/timezone:/etc/timezone:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 25 7 * * 6
      - WATCHTOWER_ROLLING_RESTART=true
      - DOCKER_HOST=${REMOTE5_URL}
    networks:
      net:
        ipv4_address: 198.19.8.7
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "10"
    restart: always